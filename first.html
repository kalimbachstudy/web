<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BlockCode(Help)</title>
    <style>
        /* позже можно будет перекинуть стили в css, 
        но сейчас, наверное, в этом нет необходимости?  */
        html{
            height: 100%;
        }
        body{
            display: grid; 
            width: 100%;
            height: 100%;
            grid-template-areas:
            "head head"
            "block work"
            "foot foot";   
            grid-template-rows: 70px 1fr 20%;
            grid-template-columns: 20% 1fr;
        }
        body > header{
            grid-area: head;
            /* background-color: #21263a; */
            background-color: #230c2d;
            color: #f7c086;
        }

        body > #box_block{
            grid-area: block; 
            /* background-color: #0e0426; */
            /* background-color: #22133b; */
            background-color:hsla(290,68%,10%,0.96);
            background-image:
            radial-gradient(at 58% 43%, hsla(329,58%,22%,0.79) 0px, transparent 50%),
            radial-gradient(at 80% 75%, hsla(248,72%,9%,1) 0px, transparent 50%),
            radial-gradient(at 21% 38%, hsla(277,64%,9%,0.97) 0px, transparent 50%),
            radial-gradient(at 77% 22%, hsla(264,64%,15%,0.98) 0px, transparent 50%),
            radial-gradient(at 55% 62%, hsla(355,10%,60%,0.51) 0px, transparent 50%);
            
            border-right: 3px solid #6b3545;
            position: relative;

            overflow-y: auto;
            scrollbar-width: none; 
            -ms-overflow-style: none; 

        }
        body > #work_space{
            grid-area: work;
            /* background-color: #0e0426;             */
            background-color:hsla(258,69%,8%,1);
            background-image:
            radial-gradient(at 73% 100%, hsla(27,41%,28%,0.55) 0px, transparent 50%),
            radial-gradient(at 13% 78%, hsla(355,30%,42%,0.56) 0px, transparent 50%),
            radial-gradient(at 99% 0%, hsla(340,70%,61%,0.63) 0px, transparent 50%),
            radial-gradient(at 0% 0%, hsla(24,50%,48%,0.4) 0px, transparent 50%);
                         
            position: relative;
        }
        body > footer{
            grid-area: foot;
            background-color: #230c2d;
        }
        .block{
            width: fit-content;
            min-height: 30px;
            background-color: #f7a751;

            gap: 10px;
            margin:15px 10px;
            padding: 10px 8px;
            
            border-radius: 5px;

            display: flex;
            align-items: center;

            cursor: grab;    
        }
        .block.dragging{
            opacity: 0.6;
            cursor: grabbing;
        }
        div[data-type="number"]{
            background-color: #ff5a57;
            input{
                background-color: #e0315493;                
            }
        }
        div[data-type="var"]{
            background-color: #ff6d5c; 
            input{
                background-color: #d04757bb;
            }           
        }
        div[data-type="brackets"]{
            background-color: #e03154;
        }
        div[data-type="operation"]{
            background-color: #d04757;
            select{
                background-color: #e03154b8; 
            }
        }
        div[data-type="if"]{
            background-color: #facf4d;
            select{
                background-color: #f7a751cf;                
            }
            position: relative;
            height: 150px;
        }

        #work_space > .block{
            position: absolute;
        }
        input, select{
            background: rgba(255, 109, 92, 0.7);
            border: 1px solid #2e0f3bc7;
            border-radius: 6px;
            padding: 6px 4px;            
        }
        input{
            width: 60px;
        }
        input::placeholder{
            color:#230c2d;
        }      
        .slot{
            display: flex;
            align-items: center;
            width: fit-content;
            min-height: 26px;
            min-width: 70px;
            background-color: rgba(46, 5, 47, 0.4);
            border-radius: 6px;
            border: 2px dashed rgba(91, 31, 92, 0.568);
        }
        .slot .block {
    padding: 4px 10px 4px 4px;      
    margin: 0;
}

    </style>
</head>

<body>
    <header>
    <h2>CodeBlock</h2>
    </header>

        <section id="box_block">
            <div class="block command" id="start" style="width: 40px;">Start</div>
            <div class="block command" id="end" style="width: 40px;">End</div>
            <div class="block command" data-type="declare">
                <span>Объявить</span>
                <input type="text" placeholder="переменная">                
            </div>

            <div class="block command" data-type="give">
                <span>Присвоить</span>
                <!-- <select></select>  ??? -->
                <input type="text" placeholder="переменная">
                <span>=</span>
                <div class="slot"></div>
            </div>

            <div class="block expression" data-type="var" style="width: 90px;">
                <!-- <select></select>  ??? -->
                <input type="text" placeholder="переменная" style="width: 80px;">
            </div>

            <div class="block expression" data-type="number">
                <input type="number" placeholder="число">
            </div>

            <div class="block expression" data-type="operation">
                <div class="slot"></div>
                <select>
                    <option value="plus" selected>+</option>
                    <option value="minus">-</option>
                    <option value="multiplication">*</option>
                    <option value="division">/</option>
                    <option value="remains">%</option>
                </select>
                <div class="slot"></div>
            </div>

            <div class="block expression" data-type="brackets">
                <span>(</span>
                <div class="slot"></div>
                <span>)</span>
            </div>
            
            <div class="block command" data-type="if">
                <span style="position: sticky; top: 10px">Если</span>
                <div class="slot"></div>
                <select>
                    <option>></option>
                    <option><</option>
                    <option>==</option>
                    <option>!=</option>
                    <option>>=</option>
                    <option><=</option>
                </select>
                <div class="slot"></div>
                <span style="position: relative; top: 50px; left: -250px">то</span>
                <div class="slot" style="position: relative; top: 50px; left: -220px"></div>
                <span style="position: relative; top: 95px; left: -360px">иначе</span>
                <div class="slot" style="position: relative; top: 95px; left: -350px"></div>
            </div>
            
        </section>

        <section id="work_space">
        </section>
    
        <footer>

        </footer>
        
        <script src="java.js"></script> 
        
</body>
</html>
