<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>BlockCode</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h2>CodeBlock</h2>

        <button id="btnRun">Выполнить</button>
        <button id="btnCheck">Проверить</button>
    </header>


    <section id="box_block">
        <div class="block command" data-type="declare">
            Объявить
            <input type="text" placeholder="переменная">
        </div>

        <div class="block command" data-type="give">
            Присвоить
            <!-- <select></select>  ??? -->
            <input type="text" placeholder="переменная">
            <span>=</span>
            <div class="slot" data-slot-type="expression"></div>
        </div>

        <div class="block expression" data-type="var">
            <!-- <select></select>  ??? -->
            <input type="text" placeholder="переменная">
        </div>

        <div class="block expression" data-type="number">
            <input type="number" placeholder="число">
        </div>

        <div class="block expression" data-type="operation">
            (
            <div class="slot" data-slot-type="expression"></div>
            <select>
                <option value="plus" selected>+</option>
                <option value="minus">-</option>
                <option value="multiplication">*</option>
                <option value="division">/</option>
                <option value="remains">%</option>
            </select>
            <div class="slot" data-slot-type="expression"></div>
            )
        </div>

        <!-- <div class="block expression" data-type="brackets">
            <span>(</span>
            <div class="slot"></div>
            <span>)</span>
        </div> -->

        <div class="block command" data-type="if">
            <div class="condition">
                Если
                <div class="slot" data-slot-type="expression"></div>
                <select>
                    <option value=">">></option>
                    <option value="<">&lt</option>
                    <option value="==">==</option>
                    <option value="!=">!=</option>
                    <option value=">=">>=</option>
                    <option value="<=">&lt=</option>
                </select>
                <div class="slot" data-slot-type="expression"></div>
            </div>

            то
            <div class="slot command-slot" data-slot-type="commands"></div>
            иначе
            <div class="slot command-slot" data-slot-type="commands"></div>
        </div>

    </section>

    <section id="work_space">
    </section>

    <footer>

    </footer>

    <script src="java.js"></script>
    <script src="interpreter.js"></script>

</body>

</html>
