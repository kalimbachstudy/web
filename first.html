<!DOCTYPE html>
<html lang="ru">
<head>
    <title>BlockCode(Help)</title>
    <style>
        .area {
            background-color: antiquewhite;
            height: 500px;
            position: relative;
        }
        .still {
            background-color: aqua;
            width: 150px;
            height: 50px;
            position: absolute;
            top: 50px;
            left: 50px;
        }
        .active {
            background-color: aqua;
            width: 150px;
            height: 50px;
            position: absolute;
            cursor: grab;
            top: 150px;
            left: 50px;
        }
        .active:active {
            cursor: grabbing;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="area" id ="area">
        <div class="still">Можно прилепить</div>
        <div class="active">Можно таскать</div>
    </div>
    <script src="java.js"></script>
</body>
</html>
