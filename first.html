<!DOCTYPE html>


<html lang="ru">
<head>
    <title>BlockCode(Help)</title>
    <style>
        .container {
            width: 400px;
            background: lightgray;
            padding: 10px;
            display: flex;     
            gap: 10px; 
            cursor: grab;            
        }
        .block:active {
            cursor: grabbing;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container" draggable="true">
        <input type="number" id="number_1" name="number_1" placeholder="here">
        <select id="activity" name="choice">
            <option value="plus" selected>+</option>
            <option value="minus">-</option>
            <option value="multiplication">*</option>
            <option value="division">/</option>
            <option value="remains">%</option>
        </select>
        <input type="number" id="number_2" name="number_2" placeholder="here">
    </div>
    <script>
        document.querySelectorAll('.container').forEach(container => {
            container.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', 'container');
            });
        });
    </script>
</body>
</html>
