<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BlockCode(Help)</title>
    <style>
        /* позже можно будет перекинуть стили в css, 
        но сейчас, наверное, в этом нет необходимости?  */
        main{
            display: flex; 
            gap: 10px
        }
        #box_block{
            width: 400px; 
            height: 600px; 
            border: 2px solid black;
            position: relative;
        }
        #work_space{
            width: 600px; 
            height: 600px; 
            display: flex; 
            gap: 10px; 
            border: 2px solid black; 
            padding-left: 20px;
            position: relative;
        }
        .block{
            width: 200px;
            background: lightgray;
            padding: 15px;
            display: flex;     
            gap: 10px; 
            cursor: grab;  
            margin-top: 15px; 
            margin-left: 15px;   
            position: absolute;      
        }
        .block.dragging{
            opacity: 0.8;
            cursor: grabbing;
        }
        
    </style>
</head>

<body>
    <header>
    <h2>CodeBlock</h2>
    </header>

    <main>
        <section id="box_block">
            <div class="block">Shhh</div>
        </section>

        <section id="work_space">
        </section>
    
        <script src="java.js"></script>
    </main>

</body>
</html>
